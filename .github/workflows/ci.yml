name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests
      - name: Compile Python files
        run: python3 -m py_compile prepare_plugin.py dynamic_dm/*.py
